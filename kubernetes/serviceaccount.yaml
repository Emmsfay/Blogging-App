---
# Service Account for blogging-app
# Minimal permissions principle - only necessary permissions granted
apiVersion: v1
kind: ServiceAccount
metadata:
  name: blogging-app
  namespace: blogging-app
automountServiceAccountToken: false
---
# Role with minimal permissions
# Only allows reading current pod's logs and status
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: blogging-app
  namespace: blogging-app
rules:
  # Allow reading pod status (for health checks)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get"]
    resourceNames: []
  # Allow reading configmaps if needed for app configuration
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
    resourceNames: []
---
# Role Binding to associate Service Account with Role
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: blogging-app
  namespace: blogging-app
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: blogging-app
subjects:
  - kind: ServiceAccount
    name: blogging-app
    namespace: blogging-app
